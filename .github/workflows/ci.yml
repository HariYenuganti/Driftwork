name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel in-progress runs for the same branch when a new push lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Lint · Typecheck · Test · Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      # `next build` doesn't need a real DB (routes are all dynamic), but
      # Prisma's validate step reads DATABASE_URL at generate time.
      DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci?sslmode=disable"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
